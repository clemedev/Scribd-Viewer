  <body>
    <h1>Scribd Viewer JS</h1>
    <h4>For educational purposes only, no warranty provided.</h4>

    <div class="form">
      <form id="form">
        <h2>Document Link:</h2>
        <input
          type="url"
          name="url"
          id="scribd_link"
          placeholder="https://www.scribd.com/document/"
          pattern="^https://www.scribd.com/document/[0-9]{9}/.+$"
          minlength="45"
          required
        />
        <button type="submit" id="submit">Submit</button>
      </form>
    </div>

    <h3>Output:</h3>

    <a id="outputLink" href="" target="_blank" rel="noopener noreferrer"
      ><p id="output"></p
    ></a>

      Project homepage:

        href="https://github.com/sussynk/Scribd-Viewer"
